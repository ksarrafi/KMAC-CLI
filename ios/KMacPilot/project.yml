name: KMacPilot
options:
  bundleIdPrefix: com.kmac
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  KMacPilot:
    type: application
    platform: iOS
    sources:
      - KMacPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kmac.pilot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "KMac Pilot"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
