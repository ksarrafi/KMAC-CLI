name: CI

# pull_request runs with secrets from the base repo when forks open PRs; workflow code from the
# PR branch would still execute on our runners. We gate the test job to same-repo PRs only so
# fork PRs do not run arbitrary code with our CI token (see job-level if below).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ShellCheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run test suite
        run: ./tests/run-tests.sh
        working-directory: ${{ github.workspace }}

      - name: ShellCheck (optional)
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            # --severity=error: project root scripts have pre-existing style/info
            # findings; gate CI on errors only. toolkit.sh/install.sh omitted (known SC2168 etc.).
            shellcheck --severity=error \
              tests/run-tests.sh \
              tests/test_toolkit.sh \
              tests/test_ui.sh \
              tests/test_vault.sh \
              tests/test_software.sh \
              tests/test_plugins.sh \
              tests/test_dotbackup.sh \
              tests/test_install.sh \
              scripts/_ui.sh \
              scripts/_vault.sh \
              scripts/software \
              scripts/dotbackup
          else
            echo "shellcheck not available on this runner — skipping"
          fi
        working-directory: ${{ github.workspace }}
